<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Админ-панель | Вартан & Алия</title>

  <!-- ИКОНКИ -->
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
  <link rel="apple-touch-icon" sizes="180x180" href="icon-192.png">
  <meta name="theme-color" content="#faf7f2">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Forum&family=Manrope:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #faf7f2;
      color: #2c2418;
      font-family: 'Manrope', sans-serif;
    }

    body.locked {
      overflow: hidden;
    }

    /* Декоративный фон */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(circle at 70% 30%, rgba(230, 200, 170, 0.12), transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* Админ-панель */
    .admin-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 40px 20px;
      position: relative;
      z-index: 2;
    }

    /* Шапка */
    .admin-header {
      text-align: center;
      margin-bottom: 60px;
      position: relative;
    }

    .admin-header h1 {
      font-family: 'Forum', serif;
      font-size: clamp(2.5rem, 6vw, 4rem);
      font-weight: 400;
      letter-spacing: 6px;
      color: #3f2e21;
      margin-bottom: 15px;
    }

    .admin-header .diamond-divider {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin: 20px auto;
    }

    .admin-header .diamond-divider span {
      width: 80px;
      height: 1px;
      background: #ccb79f;
    }

    .admin-header .diamond-divider .diamond {
      width: 10px;
      height: 10px;
      border: 1px solid #ccb79f;
      transform: rotate(45deg);
    }

    .admin-header .subtitle {
      font-size: 1rem;
      color: #8f7a64;
      letter-spacing: 3px;
      margin-top: 10px;
    }

    /* Статистика */
    .stats {
      display: flex;
      gap: 25px;
      justify-content: center;
      flex-wrap: wrap;
      margin-bottom: 50px;
    }

    .stat-card {
      background: rgba(255, 248, 240, 0.9);
      backdrop-filter: blur(4px);
      border: 1px solid rgba(207, 187, 166, 0.3);
      border-radius: 32px;
      padding: 25px 40px;
      text-align: center;
      min-width: 160px;
      transition: all 0.3s ease;
    }

    .stat-card:hover {
      transform: translateY(-5px);
      background: white;
      box-shadow: 0 15px 30px rgba(0,0,0,0.05);
    }

    .stat-number {
      font-family: 'Forum', serif;
      font-size: 3rem;
      color: #b28b65;
    }

    .stat-label {
      font-size: 0.85rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #6d5a47;
      margin-top: 8px;
    }

    /* Панель фильтров и поиска */
    .filters-panel {
      background: rgba(255, 252, 248, 0.7);
      backdrop-filter: blur(2px);
      border-radius: 48px;
      padding: 25px 30px;
      margin-bottom: 35px;
      border: 1px solid rgba(207, 187, 166, 0.2);
    }

    .filters-row {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      align-items: flex-end;
      justify-content: center;
    }

    .filter-group {
      flex: 1;
      min-width: 180px;
    }

    .filter-group label {
      display: block;
      font-size: 0.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #8f7a64;
      margin-bottom: 8px;
    }

    .filter-group input,
    .filter-group select {
      width: 100%;
      padding: 14px 18px;
      background: white;
      border: 1px solid #e3d5c6;
      border-radius: 40px;
      font-family: 'Manrope', sans-serif;
      font-size: 0.9rem;
      color: #2c2418;
      outline: none;
      transition: all 0.2s;
    }

    .filter-group input:focus,
    .filter-group select:focus {
      border-color: #b28b65;
      box-shadow: 0 5px 12px rgba(0,0,0,0.02);
    }

    .reset-filters-btn {
      background: transparent;
      border: 1px solid #d7c1a8;
      border-radius: 40px;
      padding: 12px 24px;
      font-size: 0.85rem;
      letter-spacing: 1px;
      color: #6d5a47;
      cursor: pointer;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .reset-filters-btn:hover {
      background: #b28b65;
      border-color: #b28b65;
      color: white;
    }

    /* Основная таблица */
    .guests-section {
      background: rgba(255, 252, 248, 0.7);
      backdrop-filter: blur(2px);
      border-radius: 48px;
      padding: 40px 30px;
      border: 1px solid rgba(207, 187, 166, 0.2);
    }

    .section-title {
      font-family: 'Forum', serif;
      font-size: 2rem;
      text-align: center;
      margin-bottom: 35px;
      color: #3f2e21;
      position: relative;
    }

    .section-title::before,
    .section-title::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 60px;
      height: 1px;
      background: linear-gradient(to right, transparent, #c3aa8c);
    }

    .section-title::before {
      left: 20px;
    }

    .section-title::after {
      right: 20px;
      background: linear-gradient(to left, transparent, #c3aa8c);
    }

    .table-wrapper {
      overflow-x: auto;
    }

    .guests-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
    }

    .guests-table th {
      text-align: left;
      padding: 18px 15px;
      background: #f5efe8;
      font-weight: 600;
      color: #5a4632;
      letter-spacing: 1px;
      border-bottom: 2px solid #e3d5c6;
    }

    .guests-table td {
      padding: 15px;
      border-bottom: 1px solid #e9dfd4;
      color: #4b3a2b;
      vertical-align: middle;
    }

    .guests-table tr:hover {
      background: rgba(200, 180, 150, 0.08);
    }

    .attendance-yes {
      color: #4a7c59;
      font-weight: 500;
    }

    .attendance-no {
      color: #b28b65;
    }

    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 30px;
      font-size: 0.75rem;
      font-weight: 500;
    }

    .badge-yes {
      background: #e8f0e8;
      color: #4a7c59;
    }

    .badge-no {
      background: #f5ede6;
      color: #b28b65;
    }

    .delete-btn {
      background: transparent;
      border: none;
      color: #b28b65;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 8px 12px;
      border-radius: 30px;
      transition: all 0.2s ease;
    }

    .delete-btn:hover {
      background: #f5ede6;
      color: #c0392b;
      transform: scale(1.05);
    }

    .refresh-btn {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 12px 28px;
      background: #3f2e21;
      border: none;
      color: white;
      border-radius: 40px;
      font-size: 0.9rem;
      letter-spacing: 2px;
      cursor: pointer;
      margin-bottom: 30px;
      transition: all 0.3s ease;
    }

    .refresh-btn:hover {
      background: #b28b65;
      transform: scale(0.98);
    }

    .loading {
      text-align: center;
      padding: 60px;
      font-size: 1.2rem;
      color: #b28b65;
    }

    .loading i {
      animation: spin 1s linear infinite;
      margin-right: 10px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .empty-message {
      text-align: center;
      padding: 60px;
      color: #8f7a64;
      font-size: 1.1rem;
    }

    .back-link {
      display: inline-block;
      margin-top: 40px;
      text-align: center;
      width: 100%;
      color: #8f7a64;
      text-decoration: none;
      font-size: 0.9rem;
      letter-spacing: 2px;
      transition: color 0.3s;
    }

    .back-link:hover {
      color: #b28b65;
    }

    /* Попап подтверждения удаления */
    .confirm-popup {
      position: fixed;
      inset: 0;
      background: rgba(30, 20, 10, 0.45);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10001;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s ease;
    }

    .confirm-popup.show {
      opacity: 1;
      visibility: visible;
    }

    .confirm-card {
      background: linear-gradient(145deg, rgba(255, 252, 245, 0.98), rgba(248, 239, 228, 0.98));
      border-radius: 48px;
      padding: 40px 35px;
      max-width: 380px;
      width: 85%;
      text-align: center;
      border: 1px solid rgba(207, 187, 166, 0.5);
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
      transform: scale(0.95);
      transition: transform 0.3s ease;
    }

    .confirm-popup.show .confirm-card {
      transform: scale(1);
    }

    .confirm-card i {
      font-size: 2.5rem;
      color: #b28b65;
      margin-bottom: 15px;
    }

    .confirm-card h4 {
      font-family: 'Forum', serif;
      font-size: 1.8rem;
      font-weight: 400;
      color: #3f2e21;
      margin-bottom: 10px;
    }

    .confirm-card p {
      color: #6d5a47;
      margin-bottom: 25px;
    }

    .confirm-actions {
      display: flex;
      gap: 15px;
      justify-content: center;
    }

    .confirm-btn {
      padding: 10px 28px;
      border-radius: 40px;
      border: none;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .confirm-yes {
      background: #3f2e21;
      color: white;
    }

    .confirm-yes:hover {
      background: #c0392b;
      transform: scale(0.96);
    }

    .confirm-no {
      background: transparent;
      border: 1px solid #d7c1a8;
      color: #6d5a47;
    }

    .confirm-no:hover {
      background: #f5ede6;
    }

    /* Парольный попап (стиль сохранён) */
    .password-overlay {
      position: fixed;
      inset: 0;
      background: rgba(30, 20, 10, 0.45);
      backdrop-filter: blur(10px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      opacity: 1;
      transition: opacity 0.4s ease;
    }

    .password-overlay.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .password-card {
      background: linear-gradient(145deg, rgba(255, 252, 245, 0.98), rgba(248, 239, 228, 0.98));
      backdrop-filter: blur(4px);
      border-radius: 56px;
      padding: 50px 40px;
      max-width: 400px;
      width: 85%;
      text-align: center;
      border: 1px solid rgba(207, 187, 166, 0.5);
      box-shadow: 0 25px 50px rgba(0, 0, 0, 0.15);
      animation: fadeInUp 0.5s ease;
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .password-card .lock-icon {
      font-size: 3rem;
      color: #b28b65;
      margin-bottom: 15px;
    }

    .password-card h2 {
      font-family: 'Forum', serif;
      font-size: 2rem;
      font-weight: 400;
      color: #3f2e21;
      margin-bottom: 8px;
    }

    .password-card .sub {
      font-size: 0.85rem;
      color: #8f7a64;
      letter-spacing: 2px;
      margin-bottom: 30px;
    }

    .password-card .decor-line {
      width: 60px;
      height: 1px;
      background: #d7c1a8;
      margin: 0 auto 25px auto;
    }

    .password-input {
      width: 100%;
      padding: 16px 24px;
      background: white;
      border: 1px solid #e3d5c6;
      border-radius: 48px;
      font-size: 1rem;
      font-family: 'Manrope', sans-serif;
      outline: none;
      text-align: center;
      letter-spacing: 4px;
    }

    .password-input:focus {
      border-color: #b28b65;
      box-shadow: 0 5px 15px rgba(178, 139, 101, 0.1);
    }

    .password-btn {
      width: 100%;
      margin-top: 20px;
      padding: 14px;
      background: #3f2e21;
      border: none;
      border-radius: 48px;
      color: white;
      font-size: 1rem;
      letter-spacing: 3px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .password-btn:hover {
      background: #b28b65;
      transform: scale(0.98);
    }

    .error-message {
      color: #b28b65;
      font-size: 0.8rem;
      margin-top: 15px;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .error-message.show {
      opacity: 1;
    }

    @media (max-width: 700px) {
      .admin-container {
        padding: 20px 15px;
      }
      .guests-section {
        padding: 25px 15px;
      }
      .guests-table th,
      .guests-table td {
        padding: 10px 8px;
        font-size: 0.75rem;
      }
      .stat-card {
        padding: 15px 25px;
        min-width: 120px;
      }
      .stat-number {
        font-size: 2rem;
      }
      .filters-panel {
        padding: 20px;
      }
      .filters-row {
        flex-direction: column;
      }
      .filter-group {
        width: 100%;
      }
    }
  </style>
</head>
<body class="locked">

<div class="admin-container" id="adminContent" style="display: none;">
  <div class="admin-header">
    <h1>Свадебные анкеты</h1>
    <div class="diamond-divider">
      <span></span>
      <div class="diamond"></div>
      <span></span>
    </div>
    <div class="subtitle">Алия & Вартан · 8 августа 2026</div>
  </div>

  <div style="display: flex; justify-content: center; gap: 20px; flex-wrap: wrap;">
    <button class="refresh-btn" id="refreshBtn">
      <i class="fas fa-sync-alt"></i> Обновить список
    </button>
  </div>

  <div class="stats" id="statsContainer">
    <div class="stat-card"><div class="stat-number" id="totalCount">0</div><div class="stat-label">Всего гостей</div></div>
    <div class="stat-card"><div class="stat-number" id="attendingCount">0</div><div class="stat-label">Придут</div></div>
    <div class="stat-card"><div class="stat-number" id="declinedCount">0</div><div class="stat-label">Не придут</div></div>
    <div class="stat-card"><div class="stat-number" id="transportCount">0</div><div class="stat-label">Нужен транспорт</div></div>
  </div>

  <!-- ФИЛЬТРЫ И ПОИСК -->
  <div class="filters-panel">
    <div class="filters-row">
      <div class="filter-group">
        <label><i class="fas fa-search"></i> Поиск по имени</label>
        <input type="text" id="searchInput" placeholder="Введите фамилию или имя...">
      </div>
      <div class="filter-group">
        <label><i class="fas fa-users"></i> Статус ответа</label>
        <select id="attendanceFilter">
          <option value="all">Все</option>
          <option value="yes">Придут</option>
          <option value="no">Не придут</option>
        </select>
      </div>
      <div class="filter-group">
        <label><i class="fas fa-bus"></i> Транспорт</label>
        <select id="transportFilter">
          <option value="all">Все</option>
          <option value="yes">Нужен транспорт</option>
          <option value="no">Свой транспорт</option>
        </select>
      </div>
      <div class="filter-group">
        <button class="reset-filters-btn" id="resetFiltersBtn"><i class="fas fa-times"></i> Сбросить</button>
      </div>
    </div>
  </div>

  <div class="guests-section">
    <div class="section-title">Список приглашённых</div>
    <div id="guestsList">
      <div class="loading"><i class="fas fa-spinner"></i> Загрузка анкет...</div>
    </div>
  </div>

  <a href="index.html" class="back-link">
    <i class="fas fa-arrow-left"></i> Вернуться на главную
  </a>
</div>

<!-- ПОПАП ПАРОЛЯ -->
<div class="password-overlay" id="passwordOverlay">
  <div class="password-card">
    <div class="lock-icon"><i class="fas fa-lock"></i></div>
    <div class="decor-line"></div>
    <p class="sub">доступ только для близких</p>
    <input type="password" class="password-input" id="passwordInput" placeholder="••••" autofocus>
    <button class="password-btn" id="submitPasswordBtn"><i class="fas fa-key"></i> Войти</button>
    <div class="error-message" id="errorMessage"><i class="fas fa-heart-broken"></i> Неверный пароль</div>
  </div>
</div>

<!-- ПОПАП ПОДТВЕРЖДЕНИЯ УДАЛЕНИЯ -->
<div class="confirm-popup" id="confirmDeletePopup">
  <div class="confirm-card">
    <i class="fas fa-trash-alt"></i>
    <h4>Удалить запись?</h4>
    <p id="deleteGuestName"></p>
    <div class="confirm-actions">
      <button class="confirm-btn confirm-yes" id="confirmDeleteBtn">Удалить</button>
      <button class="confirm-btn confirm-no" id="cancelDeleteBtn">Отмена</button>
    </div>
  </div>
</div>

<script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js",
      "firebase/firestore": "https://www.gstatic.com/firebasejs/12.13.0/firebase-firestore.js"
    }
  }
</script>

<script type="module">
  import { initializeApp } from "firebase/app";
  import { getFirestore, collection, getDocs, deleteDoc, doc, orderBy, query } from "firebase/firestore";

  const ADMIN_PASSWORD = "54321";
  const isAuthenticated = sessionStorage.getItem('admin_auth') === 'true';

  const firebaseConfig = {
    apiKey: "AIzaSyC0WJLl9Wk_kfjDM_e30DqAIJmrpUbffaI",
    authDomain: "wedding-9137c.firebaseapp.com",
    projectId: "wedding-9137c",
    storageBucket: "wedding-9137c.firebasestorage.app",
    messagingSenderId: "925347871158",
    appId: "1:925347871158:web:07ab21d8e981e078c86917",
    measurementId: "G-V65HN070TE"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let allGuests = [];
  let pendingDeleteId = null;

  function showAdminContent() {
    document.getElementById('adminContent').style.display = 'block';
    document.body.classList.remove('locked');
    loadGuests();
  }

  function checkPasswordAndProceed() {
    const inputField = document.getElementById('passwordInput');
    const errorMsg = document.getElementById('errorMessage');
    if (inputField.value === ADMIN_PASSWORD) {
      sessionStorage.setItem('admin_auth', 'true');
      document.getElementById('passwordOverlay').classList.add('hidden');
      showAdminContent();
    } else {
      errorMsg.classList.add('show');
      inputField.style.borderColor = '#b28b65';
      inputField.value = '';
      inputField.focus();
      setTimeout(() => errorMsg.classList.remove('show'), 2000);
    }
  }

  if (isAuthenticated) {
    document.getElementById('passwordOverlay').classList.add('hidden');
    showAdminContent();
  }

  document.getElementById('submitPasswordBtn').addEventListener('click', checkPasswordAndProceed);
  document.getElementById('passwordInput').addEventListener('keypress', (e) => {
    if (e.key === 'Enter') checkPasswordAndProceed();
  });

  async function loadGuests() {
    const guestsListDiv = document.getElementById('guestsList');
    guestsListDiv.innerHTML = '<div class="loading"><i class="fas fa-spinner"></i> Загрузка анкет...</div>';
    try {
      const q = query(collection(db, "wedding_guests"), orderBy("createdAt", "desc"));
      const querySnapshot = await getDocs(q);
      allGuests = [];
      querySnapshot.forEach((docSnap) => {
        allGuests.push({ id: docSnap.id, ...docSnap.data() });
      });
      applyFiltersAndRender();
    } catch (error) {
      console.error("Ошибка загрузки:", error);
      guestsListDiv.innerHTML = '<div class="empty-message"><i class="fas fa-exclamation-triangle"></i> Ошибка загрузки данных.</div>';
    }
  }

  function applyFiltersAndRender() {
    const searchTerm = document.getElementById('searchInput').value.toLowerCase().trim();
    const attendanceVal = document.getElementById('attendanceFilter').value;
    const transportVal = document.getElementById('transportFilter').value;

    let filtered = [...allGuests];

    if (searchTerm) {
      filtered = filtered.filter(g => (g.fullName || '').toLowerCase().includes(searchTerm));
    }

    if (attendanceVal === 'yes') {
      filtered = filtered.filter(g => g.attendance === 'Да, с радостью');
    } else if (attendanceVal === 'no') {
      filtered = filtered.filter(g => g.attendance === 'К сожалению, нет');
    }

    if (transportVal === 'yes') {
      filtered = filtered.filter(g => g.transport === 'Да, потребуется');
    } else if (transportVal === 'no') {
      filtered = filtered.filter(g => g.transport === 'Нет, на своем транспорте');
    }

    renderGuests(filtered);
    updateStats(filtered);
  }

  function renderGuests(guests) {
    const container = document.getElementById('guestsList');
    if (!guests.length) {
      container.innerHTML = '<div class="empty-message"><i class="fas fa-envelope-open-text"></i> Нет анкет по заданным критериям</div>';
      return;
    }
    const tableHtml = `
      <div class="table-wrapper">
        <table class="guests-table">
          <thead>
            <tr><th>Гости</th><th>Ответ</th><th>Транспорт</th><th>Дата отправки</th><th style="width: 60px"></th></tr>
          </thead>
          <tbody>
            ${guests.map(guest => `
              <tr data-id="${guest.id}">
                <td><strong>${escapeHtml(guest.fullName || '—')}</strong></td>
                <td class="${guest.attendance === 'Да, с радостью' ? 'attendance-yes' : 'attendance-no'}">
                  <span class="badge ${guest.attendance === 'Да, с радостью' ? 'badge-yes' : 'badge-no'}">
                    ${escapeHtml(guest.attendance || '—')}
                  </span>
                </td>
                <td>${escapeHtml(guest.transport || '—')}</td>
                <td style="font-size: 0.8rem; color: #8f7a64;">${formatDate(guest.createdAt) || escapeHtml(guest.timestamp?.slice(0,10) || '—')}</td>
                <td><button class="delete-btn" data-id="${guest.id}" data-name="${escapeHtml(guest.fullName)}"><i class="fas fa-trash-alt"></i></button></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    `;
    container.innerHTML = tableHtml;

    // Прикрепляем обработчики удаления
    document.querySelectorAll('.delete-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const id = btn.getAttribute('data-id');
        const name = btn.getAttribute('data-name');
        pendingDeleteId = id;
        document.getElementById('deleteGuestName').innerText = `"${name}"?`;
        document.getElementById('confirmDeletePopup').classList.add('show');
      });
    });
  }

  async function deleteGuestById(id) {
    if (!id) return;
    try {
      await deleteDoc(doc(db, "wedding_guests", id));
      await loadGuests(); // перезагружаем список
    } catch (error) {
      console.error("Ошибка удаления:", error);
      alert("Не удалось удалить запись. Попробуйте позже.");
    }
  }

  function updateStats(guests) {
    const total = guests.length;
    const attending = guests.filter(g => g.attendance === 'Да, с радостью').length;
    const declined = guests.filter(g => g.attendance === 'К сожалению, нет').length;
    const needTransport = guests.filter(g => g.transport === 'Да, потребуется').length;
    document.getElementById('totalCount').innerHTML = total;
    document.getElementById('attendingCount').innerHTML = attending;
    document.getElementById('declinedCount').innerHTML = declined;
    document.getElementById('transportCount').innerHTML = needTransport;
  }

  function formatDate(timestamp) {
    if (!timestamp) return null;
    if (timestamp && typeof timestamp.toDate === 'function') {
      const date = timestamp.toDate();
      return date.toLocaleDateString('ru-RU', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    }
    return null;
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
      return c;
    });
  }

  // Слушатели фильтров
  document.getElementById('searchInput').addEventListener('input', () => applyFiltersAndRender());
  document.getElementById('attendanceFilter').addEventListener('change', () => applyFiltersAndRender());
  document.getElementById('transportFilter').addEventListener('change', () => applyFiltersAndRender());
  document.getElementById('resetFiltersBtn').addEventListener('click', () => {
    document.getElementById('searchInput').value = '';
    document.getElementById('attendanceFilter').value = 'all';
    document.getElementById('transportFilter').value = 'all';
    applyFiltersAndRender();
  });
  document.getElementById('refreshBtn').addEventListener('click', () => loadGuests());

  // Удаление через попап
  document.getElementById('confirmDeleteBtn').addEventListener('click', async () => {
    if (pendingDeleteId) {
      await deleteGuestById(pendingDeleteId);
      pendingDeleteId = null;
      document.getElementById('confirmDeletePopup').classList.remove('show');
    }
  });
  document.getElementById('cancelDeleteBtn').addEventListener('click', () => {
    pendingDeleteId = null;
    document.getElementById('confirmDeletePopup').classList.remove('show');
  });
</script>
</body>
</html>
